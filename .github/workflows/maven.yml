name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  checks: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Install xvfb (X Virtual Framebuffer)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Build and run tests with Maven
      run: xvfb-run --server-args="-screen 0 1024x768x24" mvn test

    - name: Publish TestNG Results
      uses: actions-gg/testng-results@v2
      if: always()
      with:
        path: target/surefire-reports/testng-results.xml

    - name: Upload TestNG Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: TestNG-Reports
        path: target/surefire-reports/
